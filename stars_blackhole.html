<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Starfield Interactive</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #0a0a1f 0%, #000000 100%);
    height: 100%;
    width: 100%;
    cursor: none;
  }
  canvas {
    display: block;
  }
  #resetBtn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    padding: 10px 20px;
    font-size: 15px;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 8px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
  }
  #resetBtn:hover {
    background: rgba(255,255,255,0.2);
  }
  #hint {
    position: fixed;
    bottom: 16px;
    left: 20px;
    color: rgba(255,255,255,0.5);
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
    z-index: 10;
  }
</style>
</head>
<body>

<button id="resetBtn">🔄 เริ่มต้นใหม่</button>
<div id="hint">คลิกปุ่มซ้ายของเมาส์เพื่อดึงดวงดาวเข้าหาตำแหน่งลูกศร</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---------- Mouse state ----------
let mouse = { x: W / 2, y: H / 2 };
let mouseMoved = false;

window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouseMoved = true;
});

// ---------- Star class ----------
const STAR_COUNT = 400;
let stars = [];

function randomStar() {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    // original home position (for resetting after being pulled)
    homeX: 0,
    homeY: 0,
    size: Math.random() * 1.8 + 0.4,
    baseAlpha: Math.random() * 0.6 + 0.4,
    twinklePhase: Math.random() * Math.PI * 2,
    twinkleSpeed: Math.random() * 0.02 + 0.005,
    // physics for attraction effect
    vx: 0,
    vy: 0,
    pulled: false,
    arrived: false
  };
}

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    const s = randomStar();
    s.homeX = s.x;
    s.homeY = s.y;
    stars.push(s);
  }
}
initStars();

// ---------- Click: pull stars toward cursor ----------
canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return; // left click only
  const cx = mouse.x, cy = mouse.y;
  stars.forEach(s => {
    s.pulled = true;
    s.targetX = cx;
    s.targetY = cy;
  });
});

// release stars back to drifting after they arrive (optional gentle behavior)
canvas.addEventListener('mouseup', () => {
  // let them keep drifting from wherever they ended up
});

// ---------- Reset button ----------
document.getElementById('resetBtn').addEventListener('click', () => {
  initStars();
});

// ---------- Draw custom arrow cursor ----------
function drawArrow(x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, 18);
  ctx.lineTo(4.5, 14);
  ctx.lineTo(8, 21.5);
  ctx.lineTo(10.5, 20.3);
  ctx.lineTo(7, 13);
  ctx.lineTo(12.5, 13);
  ctx.closePath();
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 1;
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

// ---------- Animation loop ----------
function animate() {
  ctx.clearRect(0, 0, W, H);

  // subtle nebula background glow
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)/1.2);
  grad.addColorStop(0, 'rgba(20,20,50,0.4)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    if (s.pulled) {
      const dx = s.targetX - s.x;
      const dy = s.targetY - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 2) {
        s.vx += dx * 0.0008;
        s.vy += dy * 0.0008;
        s.vx *= 0.95;
        s.vy *= 0.95;
        s.x += s.vx;
        s.y += s.vy;
      } else {
        // arrived: stop moving and disappear until reset
        s.pulled = false;
        s.arrived = true;
        s.vx = 0;
        s.vy = 0;
      }
    }

    if (s.arrived) return; // stay hidden, screen remains empty here

    // twinkle
    s.twinklePhase += s.twinkleSpeed;
    const alpha = s.baseAlpha * (0.6 + 0.4 * Math.sin(s.twinklePhase));

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
    ctx.fill();
  });

  // draw arrow at mouse position
  if (mouseMoved) drawArrow(mouse.x, mouse.y);

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
