<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>โลกหมุนกลางอวกาศ พร้อมดาวเทียม</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000006; height:100%; }
  canvas { display:block; }
  #info {
    position:fixed; top:18px; left:22px; color:#cfe3ff;
    font-family: 'Segoe UI', 'Sarabun', sans-serif;
    letter-spacing:1px; z-index:10; pointer-events:none;
    text-shadow: 0 0 12px rgba(80,150,255,0.6);
  }
  #info h1 { font-size:20px; font-weight:300; margin:0 0 4px 0; }
  #info p { font-size:12px; margin:0; opacity:0.6; }
  #loading {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    color:#7fb8ff; font-family:sans-serif; font-size:14px; letter-spacing:2px;
    background:#000006; z-index:20; transition:opacity 0.6s ease;
  }
</style>
</head>
<body>
<div id="loading">กำลังโคจร...</div>
<div id="info">
  <h1>🌍 โลก</h1>
  <p>หมุนรอบตัวเอง • ดาวเทียม 6 ดวงโคจรรอบโลก</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', () => {

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 6, 20);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// ---------- Lights ----------
scene.add(new THREE.AmbientLight(0x223355, 0.9));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.6);
sun.position.set(15, 8, 10);
scene.add(sun);

// ---------- Starfield ----------
function makeStars(count, radius, size, color){
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r = radius * (0.6 + Math.random()*0.4);
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos((Math.random()*2)-1);
    pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2] = r*Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const mat = new THREE.PointsMaterial({ color, size, sizeAttenuation:true, transparent:true, opacity:0.9 });
  return new THREE.Points(geo, mat);
}
scene.add(makeStars(3500, 400, 0.9, 0xffffff));
scene.add(makeStars(600, 250, 1.6, 0x9fc8ff));

// ---------- Procedural Earth texture ----------
function makeEarthTexture(){
  const w=1024, h=512;
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  const ctx = c.getContext('2d');

  const ocean = ctx.createLinearGradient(0,0,0,h);
  ocean.addColorStop(0, '#0a3d6b');
  ocean.addColorStop(0.5, '#0f5c95');
  ocean.addColorStop(1, '#0a3d6b');
  ctx.fillStyle = ocean;
  ctx.fillRect(0,0,w,h);

  function blob(cx, cy, rx, ry, color){
    ctx.fillStyle = color;
    ctx.beginPath();
    const pts = 14;
    for(let i=0;i<=pts;i++){
      const a = (i/pts)*Math.PI*2;
      const jitter = 0.7 + Math.random()*0.5;
      const x = cx + Math.cos(a)*rx*jitter;
      const y = cy + Math.sin(a)*ry*jitter;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fill();
  }

  const greens = ['#2f6b34','#3c7d3f','#356e39','#4a8a3f'];
  // Rough continent-like blobs placed by hand for a believable planet silhouette
  const continents = [
    [190,150,90,60],[230,230,60,50],[170,260,50,70],   // Americas-ish
    [500,140,70,45],[520,210,55,60],                    // Europe/Africa-ish
    [650,150,110,55],[760,230,90,60],[820,150,50,40],   // Asia-ish
    [830,320,60,35],[900,340,40,25]                     // Oceania-ish
  ];
  continents.forEach(([x,y,rx,ry],i)=>{
    blob(x,y,rx,ry, greens[i%greens.length]);
    blob(x+rx*0.3, y+ry*0.2, rx*0.5, ry*0.5, '#5a9e4a');
  });

  // ice caps
  ctx.fillStyle = '#eef6fb';
  ctx.fillRect(0,0,w,18);
  ctx.fillRect(0,h-18,w,18);

  // subtle noise for texture
  const imgData = ctx.getImageData(0,0,w,h);
  for(let i=0;i<imgData.data.length;i+=4){
    const n = (Math.random()-0.5)*10;
    imgData.data[i]+=n; imgData.data[i+1]+=n; imgData.data[i+2]+=n;
  }
  ctx.putImageData(imgData,0,0);

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

function makeCloudTexture(){
  const w=1024, h=512;
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  for(let i=0;i<180;i++){
    const x = Math.random()*w, y = Math.random()*h;
    const rx = 20+Math.random()*60, ry = 8+Math.random()*20;
    ctx.globalAlpha = 0.15 + Math.random()*0.25;
    ctx.beginPath();
    ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);
    ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}

// ---------- Earth ----------
const earthGroup = new THREE.Group();
scene.add(earthGroup);

const earthGeo = new THREE.SphereGeometry(5, 64, 64);
const earthMat = new THREE.MeshPhongMaterial({
  map: makeEarthTexture(),
  shininess: 12,
  specular: new THREE.Color(0x333355)
});
const earth = new THREE.Mesh(earthGeo, earthMat);
earth.rotation.z = THREE.MathUtils.degToRad(23.4); // axial tilt
earthGroup.add(earth);

// clouds
const cloudGeo = new THREE.SphereGeometry(5.06, 64, 64);
const cloudMat = new THREE.MeshPhongMaterial({ map: makeCloudTexture(), transparent:true, opacity:0.55, depthWrite:false });
const clouds = new THREE.Mesh(cloudGeo, cloudMat);
clouds.rotation.z = earth.rotation.z;
earthGroup.add(clouds);

// atmosphere glow
const atmoGeo = new THREE.SphereGeometry(5.35, 64, 64);
const atmoMat = new THREE.ShaderMaterial({
  transparent:true,
  side: THREE.BackSide,
  uniforms: {},
  vertexShader: `
    varying vec3 vNormal;
    void main(){
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    void main(){
      float intensity = pow(0.65 - dot(vNormal, vec3(0,0,1.0)), 3.0);
      gl_FragColor = vec4(0.35, 0.6, 1.0, 1.0) * intensity;
    }
  `
});
const atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
earthGroup.add(atmosphere);

// ---------- Satellites ----------
function makeSatellite(){
  const g = new THREE.Group();

  const bodyGeo = new THREE.BoxGeometry(0.22,0.22,0.35);
  const bodyMat = new THREE.MeshPhongMaterial({ color:0xdddddd, shininess:80 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  g.add(body);

  const panelGeo = new THREE.BoxGeometry(0.55,0.02,0.2);
  const panelMat = new THREE.MeshPhongMaterial({ color:0x1c3d7a, shininess:100, emissive:0x0a1a3a });
  const panelL = new THREE.Mesh(panelGeo, panelMat);
  panelL.position.x = -0.5;
  const panelR = panelL.clone();
  panelR.position.x = 0.5;
  g.add(panelL, panelR);

  const dishGeo = new THREE.ConeGeometry(0.08, 0.06, 12);
  const dish = new THREE.Mesh(dishGeo, new THREE.MeshPhongMaterial({ color:0xffcc66 }));
  dish.position.z = 0.22;
  dish.rotation.x = Math.PI/2;
  g.add(dish);

  return g;
}

function makeOrbitLine(radius, tiltX, tiltY){
  const curve = new THREE.EllipseCurve(0,0, radius, radius, 0, Math.PI*2, false, 0);
  const points = curve.getPoints(128).map(p => new THREE.Vector3(p.x, 0, p.y));
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color:0x3a6fb0, transparent:true, opacity:0.35 });
  const line = new THREE.LineLoop(geo, mat);
  line.rotation.x = tiltX;
  line.rotation.z = tiltY;
  return line;
}

const satellites = [];
const satCount = 6;
for(let i=0;i<satCount;i++){
  const radius = 6.5 + i*0.9 + Math.random()*0.4;
  const tiltX = (Math.random()-0.5) * Math.PI * 0.9;
  const tiltZ = (Math.random()-0.5) * Math.PI * 0.6;
  const speed = (0.25 + Math.random()*0.35) * (Math.random() < 0.5 ? 1 : -1);
  const phase = Math.random()*Math.PI*2;

  const pivot = new THREE.Group();
  pivot.rotation.x = tiltX;
  pivot.rotation.z = tiltZ;
  scene.add(pivot);

  const sat = makeSatellite();
  pivot.add(sat);

  const orbitLine = makeOrbitLine(radius, tiltX, tiltZ);
  scene.add(orbitLine);

  satellites.push({ pivot, sat, radius, speed, phase });
}

// ---------- Resize ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Mouse drag to rotate view ----------
let isDragging = false, prevX=0, prevY=0;
let camTheta = 0.3, camPhi = 1.2, camDist = 20;
function updateCamera(){
  camera.position.x = camDist * Math.sin(camPhi) * Math.sin(camTheta);
  camera.position.z = camDist * Math.sin(camPhi) * Math.cos(camTheta);
  camera.position.y = camDist * Math.cos(camPhi);
  camera.lookAt(0,0,0);
}
updateCamera();

renderer.domElement.addEventListener('pointerdown', e => { isDragging=true; prevX=e.clientX; prevY=e.clientY; });
window.addEventListener('pointerup', () => isDragging=false);
window.addEventListener('pointermove', e => {
  if(!isDragging) return;
  const dx = e.clientX - prevX, dy = e.clientY - prevY;
  camTheta -= dx*0.005;
  camPhi = Math.min(Math.max(camPhi - dy*0.005, 0.3), Math.PI-0.3);
  prevX = e.clientX; prevY = e.clientY;
  updateCamera();
});
renderer.domElement.addEventListener('wheel', e => {
  camDist = Math.min(Math.max(camDist + e.deltaY*0.01, 9), 45);
  updateCamera();
}, { passive:true });

// ---------- Animate ----------
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  earth.rotation.y = t * 0.12;
  clouds.rotation.y = t * 0.16;

  satellites.forEach(s => {
    const angle = s.phase + t * s.speed;
    s.sat.position.set(Math.cos(angle)*s.radius, 0, Math.sin(angle)*s.radius);
    s.sat.rotation.y = angle + Math.PI/2;
    s.sat.rotation.x = 0.3;
  });

  renderer.render(scene, camera);
}
animate();

document.getElementById('loading').style.opacity = '0';
setTimeout(() => document.getElementById('loading').style.display='none', 600);

});
</script>
</body>
</html>
