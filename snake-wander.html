<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>งูเลื้อย</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #1b2a1b 0%, #0a120a 100%);
    height: 100%;
    cursor: crosshair;
  }
  canvas {
    display: block;
  }
  #hint {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: #9be89b;
    font-family: sans-serif;
    font-size: 14px;
    opacity: 0.8;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="hint">คลิกที่ใดก็ได้ เพื่อให้งูเลื้อยไปยังจุดนั้น</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- งูเป็นชุดของจุด (segments) ตามหัวงู ---
const SEGMENT_COUNT = 28;
const SEGMENT_SPACING = 9;
const points = [];
for (let i = 0; i < SEGMENT_COUNT; i++) {
  points.push({ x: canvas.width / 2, y: canvas.height / 2 });
}

let head = { x: canvas.width / 2, y: canvas.height / 2 };
let angle = Math.random() * Math.PI * 2;
let target = null; // จุดที่คลิก (ถ้ามี)
let wanderTimer = 0;

const SPEED = 3.2;

canvas.addEventListener('click', (e) => {
  target = { x: e.clientX, y: e.clientY };
});

function step() {
  // ข้อ 3: ถ้ามีเป้าหมายจากการคลิก ให้เลื้อยไปที่จุดนั้น
  if (target) {
    const dx = target.x - head.x;
    const dy = target.y - head.y;
    const dist = Math.hypot(dx, dy);
    if (dist < SPEED) {
      // ถึงจุดหมายแล้ว กลับไปเลื้อยไปมาแบบอิสระ (ข้อ 4: วนไปข้อ 2)
      target = null;
    } else {
      const desiredAngle = Math.atan2(dy, dx);
      angle = turnToward(angle, desiredAngle, 0.15);
    }
  } else {
    // ข้อ 2: เลื้อยไปมาอย่างอิสระ พร้อมสุ่มเปลี่ยนทิศเป็นระยะ
    wanderTimer -= 1;
    if (wanderTimer <= 0) {
      wanderTimer = 30 + Math.random() * 40;
      angle += (Math.random() - 0.5) * 1.2;
    } else {
      angle += Math.sin(Date.now() / 400) * 0.02; // ทำให้ดูเลื้อยเป็นคลื่น
    }

    // ชนขอบจอ ให้เลี้ยวกลับเข้ามา
    const margin = 40;
    if (head.x < margin) angle = turnToward(angle, 0, 0.1);
    if (head.x > canvas.width - margin) angle = turnToward(angle, Math.PI, 0.1);
    if (head.y < margin) angle = turnToward(angle, Math.PI / 2, 0.1);
    if (head.y > canvas.height - margin) angle = turnToward(angle, -Math.PI / 2, 0.1);
  }

  head.x += Math.cos(angle) * SPEED;
  head.y += Math.sin(angle) * SPEED;

  // ให้ลำตัวตามหัวแบบ inverse-kinematics ง่ายๆ
  points[0] = { x: head.x, y: head.y };
  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1];
    const cur = points[i];
    const dx = prev.x - cur.x;
    const dy = prev.y - cur.y;
    const dist = Math.hypot(dx, dy) || 1;
    const ratio = (dist - SEGMENT_SPACING) / dist;
    points[i] = {
      x: cur.x + dx * ratio,
      y: cur.y + dy * ratio
    };
  }
}

function turnToward(current, desired, rate) {
  let diff = desired - current;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  return current + diff * rate;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ถ้ามีเป้าหมาย วาดจุดหมายไว้เบาๆ
  if (target) {
    ctx.beginPath();
    ctx.arc(target.x, target.y, 8, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(155, 232, 155, 0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // วาดลำตัวงู (ลดขนาดลงเรื่อยๆ ไปทางหาง)
  for (let i = points.length - 1; i >= 0; i--) {
    const p = points[i];
    const t = i / points.length; // 0 = หัว, 1 = หาง
    const radius = 12 * (1 - t * 0.7);
    const shade = Math.floor(60 + (1 - t) * 100);
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${30 + shade * 0.3}, ${shade + 60}, ${30 + shade * 0.3})`;
    ctx.fill();
  }

  // วาดตา ที่หัวงู
  const eyeOffset = 6;
  const ex = head.x + Math.cos(angle + Math.PI / 2) * eyeOffset;
  const ey = head.y + Math.sin(angle + Math.PI / 2) * eyeOffset;
  const ex2 = head.x + Math.cos(angle - Math.PI / 2) * eyeOffset;
  const ey2 = head.y + Math.sin(angle - Math.PI / 2) * eyeOffset;
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(ex, ey, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, ey2, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'black';
  ctx.beginPath(); ctx.arc(ex, ey, 1.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, ey2, 1.4, 0, Math.PI * 2); ctx.fill();

  // ลิ้นแฉก
  const tongueLen = 16;
  const flick = Math.sin(Date.now() / 100) * 4;
  const tx = head.x + Math.cos(angle) * tongueLen;
  const ty = head.y + Math.sin(angle) * tongueLen;
  ctx.strokeStyle = 'red';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(head.x + Math.cos(angle) * 12, head.y + Math.sin(angle) * 12);
  ctx.lineTo(tx, ty);
  ctx.lineTo(tx + Math.cos(angle + 0.5) * 4, ty + Math.sin(angle + 0.5) * 4 + flick * 0.2);
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx + Math.cos(angle - 0.5) * 4, ty + Math.sin(angle - 0.5) * 4 - flick * 0.2);
  ctx.stroke();
}

function loop() {
  step();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
